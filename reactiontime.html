<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaction Time Test | Human Benchmark</title>
    <style>
        /* 全局样式 - 还原humanbenchmark极简风格 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        body {
            background-color: #1a1a1a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            line-height: 1.6;
        }

        /* 头部导航 - 仿原版顶部栏 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background-color: #1a1a1a;
            border-bottom: 1px solid #333;
            z-index: 100;
        }

        .logo {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            text-decoration: none;
        }

        .logo span {
            color: #4CAF50;
        }

        .nav-links a {
            color: #ccc;
            text-decoration: none;
            margin-left: 25px;
            font-size: 14px;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: #fff;
        }

        /* 主容器 - 核心测试区域 */
        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
            margin-top: 80px;
        }

        h1 {
            font-size: 32px;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #999;
            font-size: 16px;
            margin-bottom: 40px;
        }

        /* 测试面板 - 核心交互区域 */
        .test-panel {
            width: 100%;
            height: 300px;
            border-radius: 8px;
            background-color: #2d2d2d;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s ease;
            position: relative;
            overflow: hidden;
        }

        /* 不同状态的背景色 - 还原原版配色 */
        .test-panel.ready {
            background-color: #2196F3; /* 绿色：等待点击开始 */
        }

        .test-panel.waiting {
            background-color: #f44336; /* 红色：等待随机时间 */
            cursor: wait;
        }

        .test-panel.clickable {
            background-color: #4CAF50; /* 蓝色：可点击计时 */
        }

        .test-panel:hover:not(.waiting) {
            transform: scale(1.01);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
        }

        /* 面板内文字 */
        .panel-text {
            font-size: 24px;
            font-weight: 400;
            color: white;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
            transition: opacity 0.1s ease;
        }

        /* 结果展示区域 */
        .result-container {
            margin-top: 30px;
            padding: 20px;
            border-radius: 8px;
            background-color: #2d2d2d;
            display: none; /* 默认隐藏 */
        }

        .result-title {
            font-size: 20px;
            margin-bottom: 15px;
        }

        .reaction-time {
            font-size: 48px;
            font-weight: 600;
            color: #4CAF50;
            margin: 10px 0;
        }

        .percentile {
            color: #999;
            font-size: 16px;
            margin-bottom: 20px;
        }

        /* 按钮样式 - 还原原版扁平风格 */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            background-color: #4CAF50;
            color: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            margin: 0 10px;
        }

        .btn:hover {
            background-color: #45a049;
            transform: translateY(-2px);
        }

        .btn.secondary {
            background-color: #3d3d3d;
        }

        .btn.secondary:hover {
            background-color: #4d4d4d;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .navbar {
                padding: 10px 20px;
            }

            .nav-links {
                display: none;
            }

            h1 {
                font-size: 28px;
            }

            .test-panel {
                height: 250px;
            }

            .reaction-time {
                font-size: 36px;
            }

            .btn {
                padding: 10px 20px;
                margin: 5px 0;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部导航栏 - 仿humanbenchmark -->
    <nav class="navbar">
        <a href="#" class="logo">Human<span>Benchmark</span></a>
        <div class="nav-links">
            <a href="#">Tests</a>
            <a href="#">Stats</a>
            <a href="#">About</a>
        </div>
    </nav>

    <!-- 主测试容器 -->
    <div class="container">
        <h1>Reaction Time</h1>
        <p class="subtitle">Click the screen as soon as the color changes. Click anywhere to start.</p>
        
        <!-- 核心测试面板 -->
        <div class="test-panel" id="testPanel">
            <div class="panel-text" id="panelText">Click to start</div>
        </div>

        <!-- 结果展示区域 -->
        <div class="result-container" id="resultContainer">
            <div class="result-title">Your reaction time</div>
            <div class="reaction-time" id="reactionTime">0 ms</div>
            <div class="percentile" id="percentile">Faster than ~50% of users</div>
            <button class="btn" id="resetBtn">Try Again</button>
            <button class="btn secondary" id="anotherTestBtn">Another Test</button>
        </div>
    </div>

    <script>
        // 获取DOM元素
        const testPanel = document.getElementById('testPanel');
        const panelText = document.getElementById('panelText');
        const resultContainer = document.getElementById('resultContainer');
        const reactionTime = document.getElementById('reactionTime');
        const percentile = document.getElementById('percentile');
        const resetBtn = document.getElementById('resetBtn');
        const anotherTestBtn = document.getElementById('anotherTestBtn');

        // 全局状态
        let testState = 'idle'; // idle: 闲置, waiting: 等待随机时间, clickable: 可点击
        let startTime = 0;
        let endTime = 0;

        // 初始化事件监听
        init();

        function init() {
            // 测试面板点击事件
            testPanel.addEventListener('click', handlePanelClick);
            // 重新测试按钮
            resetBtn.addEventListener('click', resetTest);
            // 其他测试按钮（仅占位，仿原版）
            anotherTestBtn.addEventListener('click', () => {
                alert('This is a demo - Other tests would be here!');
            });
        }

        // 处理测试面板点击
        function handlePanelClick() {
            switch (testState) {
                case 'idle':
                    // 开始测试：进入等待状态
                    startTest();
                    break;
                case 'waiting':
                    // 提前点击（作弊）
                    panelText.textContent = 'Too soon! Click to try again';
                    testState = 'idle';
                    testPanel.classList.remove('waiting');
                    testPanel.classList.add('ready');
                    break;
                case 'clickable':
                    // 有效点击：计算反应时间
                    endTest();
                    break;
            }
        }

        // 开始测试流程
        function startTest() {
            // 更新状态和样式
            testState = 'waiting';
            testPanel.classList.remove('ready');
            testPanel.classList.add('waiting');
            panelText.textContent = 'Wait for it...';

            // 随机等待1-5秒（仿原版随机时长）
            const randomDelay = Math.floor(Math.random() * 4000) + 1000; // 1000-5000ms
            
            // 延迟后进入可点击状态
            setTimeout(() => {
                if (testState !== 'waiting') return; // 防止提前重置
                
                testState = 'clickable';
                testPanel.classList.remove('waiting');
                testPanel.classList.add('clickable');
                panelText.textContent = 'CLICK!';
                startTime = Date.now(); // 记录可点击的时间戳
            }, randomDelay);
        }

        // 结束测试：计算并展示结果
        function endTest() {
            // 记录点击时间
            endTime = Date.now();
            // 计算反应时间（毫秒）
            const rt = endTime - startTime;
            
            // 更新状态
            testState = 'idle';
            testPanel.classList.remove('clickable');
            testPanel.classList.add('ready');
            
            // 展示结果
            showResult(rt);
        }

        // 展示测试结果
        function showResult(time) {
            // 更新结果数值
            reactionTime.textContent = `${time} ms`;
            // 计算百分位（仿原版的用户对比）
            const perc = calculatePercentile(time);
            percentile.textContent = `Faster than ~${perc}% of users`;
            
            // 显示结果区域
            resultContainer.style.display = 'block';
            // 隐藏测试面板文字
            panelText.textContent = '';
        }

        // 重置测试
        function resetTest() {
            // 重置状态
            testState = 'idle';
            // 重置样式
            testPanel.classList.remove('waiting', 'clickable');
            testPanel.classList.add('ready');
            // 重置文字
            panelText.textContent = 'Click to start';
            // 隐藏结果区域
            resultContainer.style.display = 'none';
        }

        // 计算反应时间百分位（仿humanbenchmark的分布）
        function calculatePercentile(time) {
            if (time < 150) return 95;
            if (time < 180) return 90;
            if (time < 210) return 80;
            if (time < 240) return 70;
            if (time < 270) return 60;
            if (time < 300) return 50;
            if (time < 330) return 40;
            if (time < 360) return 30;
            if (time < 390) return 20;
            if (time < 420) return 10;
            return 5;
        }
    </script>
</body>
</html>
